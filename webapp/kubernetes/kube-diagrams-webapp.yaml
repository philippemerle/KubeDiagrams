apiVersion: v1
kind: Namespace
metadata:
  name: kube-diagrams
  labels:
    app.kubernetes.io/name: KubeDiagrams
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kube-diagrams
  labels:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: frontend
spec:
  ports:
    - port: 80
      name: http
  selector:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: frontend
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kube-diagrams
  labels:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: frontend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: KubeDiagrams
      app.kubernetes.io/component: frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: KubeDiagrams
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - image: philippemerle/kubediagrams-frontend:latest
        name: frontend
        env:
        - name: BACKEND_URL
          value: http://backend:5000
        ports:
        - containerPort: 80
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kube-diagrams
  labels:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: backend
spec:
  ports:
    - port: 5000
  selector:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: backend
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kube-diagrams
  labels:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: backend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: KubeDiagrams
      app.kubernetes.io/component: backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: KubeDiagrams
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: backend
      containers:
      - image: philippemerle/kubediagrams-backend:latest
        name: backend
        ports:
        - containerPort: 5000
          name: backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: kube-diagrams
  labels:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-diagrams
  labels:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: backend
subjects:
- apiGroup: ""
  kind: ServiceAccount
  name: backend
  namespace: kube-diagrams
roleRef:
  kind: ClusterRole
  name: kube-diagrams
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-diagrams
  labels:
    app.kubernetes.io/name: KubeDiagrams
    app.kubernetes.io/component: backend
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
