apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: gateway-class
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
spec:
  gatewayClassName: gateway-class
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-route
spec:
  parentRefs:
    - name: gateway
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: acme.io
            kind: CustomFilter
            name: custom-filter
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: grpc-route
spec:
  parentRefs:
    - name: gateway
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: acme.io
            kind: CustomFilter
            name: custom-filter
---
apiVersion: acme.io/v1
kind: CustomFilter
metadata:
  name: custom-filter
