#$ Used in:
#$ - site-src/guides/tls.md
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: wildcard-tls-gateway
spec:
  gatewayClassName: example
  listeners:
  - name: foo-https
    protocol: HTTPS
    port: 443
    hostname: foo.example.com
    tls:
      certificateRefs:
      - kind: Secret
        group: ""
        name: foo-example-com-cert
  - name: wildcard-https
    protocol: HTTPS
    port: 443
    hostname: "*.example.com"
    tls:
      certificateRefs:
      - kind: Secret
        group: ""
        name: wildcard-example-com-cert
---
# Following are resources not explicitely declared in
# https://gateway-api.sigs.k8s.io/guides/getting-started/simple-gateway/
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: example
spec:
  controllerName: "example.net/gateway-controller"
---
apiVersion: v1
kind: Secret
metadata:
  name: foo-example-com-cert
---
apiVersion: v1
kind: Secret
metadata:
  name: wildcard-example-com-cert