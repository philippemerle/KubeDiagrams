kind: HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: foo
  namespace: foo
spec:
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /bar
    backendRefs:
    - group: multicluster.x-k8s.io
      kind: ServiceImport
      name: bar
      namespace: bar
---
kind: ReferenceGrant
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: bar
  namespace: bar
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: foo
  to:
  - group: multicluster.x-k8s.io
    kind: ServiceImport
# Following are resources not explicitely declared
apiVersion: multicluster.x-k8s.io/v1
kind: ServiceImport
metadata:
  name: bar
  namespace: bar
